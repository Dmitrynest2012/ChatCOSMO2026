<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P2P Мессенджер</title>
  <script type="module">
    // Основной импорт — самый стабильный способ через esm.run
    import { joinRoom } from 'https://esm.run/trystero';

    // ==================== ДАННЫЕ ====================
    let myId = localStorage.getItem('myPeerId');
    if (!myId) {
      myId = 'user_' + crypto.randomUUID().slice(0, 12);
      localStorage.setItem('myPeerId', myId);
    }

    let myName = localStorage.getItem('myName') || 'Я';
    let myAvatar = localStorage.getItem('myAvatar') || '';
    let friends = JSON.parse(localStorage.getItem('friends') || '[]');
    let chats = JSON.parse(localStorage.getItem('chats') || '{}');

    let currentChatId = null;
    let currentRoom = null;
    let onlinePeers = new Set();

    const appId = 'p2p-messenger-cosmo-2026';

    let elements = {};

    function init() {
      elements = {
        myId: document.getElementById('myId'),
        myNameInput: document.getElementById('myName'),
        myAvatarPreview: document.getElementById('myAvatarPreview'),
        avatarInput: document.getElementById('avatarInput'),
        friendsList: document.getElementById('friendsList'),
        chatHeader: document.getElementById('chatHeader'),
        messagesDiv: document.getElementById('messages'),
        messageInput: document.getElementById('messageInput'),
        sendBtn: document.getElementById('sendBtn'),
        addFriendBtn: document.getElementById('addFriendBtn'),
        newFriendId: document.getElementById('newFriendId'),
        newFriendName: document.getElementById('newFriendName'),
        profileTab: document.getElementById('profileTab'),
        friendsTab: document.getElementById('friendsTab'),
        copyIdBtn: document.getElementById('copyIdBtn'),
        clearChatBtn: document.getElementById('clearChatBtn'),
        profileTabBtn: document.getElementById('profileTabBtn'),
        friendsTabBtn: document.getElementById('friendsTabBtn')
      };

      elements.myId.textContent = myId;
      elements.myNameInput.value = myName;
      if (myAvatar) elements.myAvatarPreview.src = myAvatar;

      renderFriends();

      elements.profileTabBtn.addEventListener('click', () => switchTab('profile'));
      elements.friendsTabBtn.addEventListener('click', () => switchTab('friends'));

      elements.myNameInput.addEventListener('change', saveMyProfile);
      elements.avatarInput.addEventListener('change', handleAvatarUpload);
      elements.copyIdBtn.addEventListener('click', copyMyId);
      elements.clearChatBtn.addEventListener('click', clearCurrentChat);
      elements.addFriendBtn.addEventListener('click', addNewFriend);

      switchTab('friends');
    }

    function switchTab(tab) {
      elements.profileTab.classList.add('hidden');
      elements.friendsTab.classList.add('hidden');

      if (tab === 'profile') {
        elements.profileTab.classList.remove('hidden');
        elements.profileTabBtn.classList.add('active');
        elements.friendsTabBtn.classList.remove('active');
      } else {
        elements.friendsTab.classList.remove('hidden');
        elements.friendsTabBtn.classList.add('active');
        elements.profileTabBtn.classList.remove('active');
      }
    }

    function saveMyProfile() {
      myName = elements.myNameInput.value.trim() || 'Я';
      localStorage.setItem('myName', myName);
    }

    function handleAvatarUpload(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        myAvatar = ev.target.result;
        localStorage.setItem('myAvatar', myAvatar);
        elements.myAvatarPreview.src = myAvatar;
      };
      reader.readAsDataURL(file);
    }

    function copyMyId() {
      navigator.clipboard.writeText(myId).then(() => {
        const btn = elements.copyIdBtn;
        const orig = btn.textContent;
        btn.textContent = '✓ Скопировано!';
        setTimeout(() => btn.textContent = orig, 2000);
      });
    }

    function renderFriends() {
      elements.friendsList.innerHTML = '';
      if (friends.length === 0) {
        elements.friendsList.innerHTML = `<p style="opacity:0.6;text-align:center;padding:30px;">Пока нет друзей.<br>Добавьте первого ниже ↓</p>`;
        return;
      }

      friends.forEach(friend => {
        const isOnline = onlinePeers.has(friend.id);
        const div = document.createElement('div');
        div.className = `friend-item ${currentChatId === friend.id ? 'active' : ''}`;
        div.innerHTML = `
          <div style="display:flex;align-items:center;gap:10px;position:relative;">
            <div style="width:40px;height:40px;border-radius:50%;background:#333;overflow:hidden;flex-shrink:0;">
              ${friend.avatar ? `<img src="${friend.avatar}" style="width:100%;height:100%;object-fit:cover;">` : ''}
            </div>
            <div style="flex:1;min-width:0;">
              <strong>${friend.name}</strong>
              <div style="font-size:0.82em;color:${isOnline ? '#4ade80' : '#888'};">${isOnline ? '● онлайн' : 'оффлайн'}</div>
              <small style="word-break:break-all;opacity:0.7;">${friend.id}</small>
            </div>
            <span onclick="deleteFriend('${friend.id}');event.stopImmediatePropagation();" 
                  style="position:absolute;top:6px;right:10px;color:#f66;font-size:1.5em;cursor:pointer;line-height:1;">×</span>
          </div>
        `;
        div.onclick = (e) => {
          if (e.target.tagName !== 'SPAN') openChat(friend.id, friend.name, friend.avatar);
        };
        elements.friendsList.appendChild(div);
      });
    }

    function addNewFriend() {
      const id = elements.newFriendId.value.trim();
      const name = elements.newFriendName.value.trim() || 'Друг';
      if (!id) return alert('Введите ID друга');
      if (friends.some(f => f.id === id)) return alert('Друг уже добавлен');

      friends.push({ id, name, avatar: '' });
      localStorage.setItem('friends', JSON.stringify(friends));
      renderFriends();
      elements.newFriendId.value = '';
      elements.newFriendName.value = '';
    }

    window.deleteFriend = function(friendId) {
      if (!confirm('Удалить друга?')) return;
      friends = friends.filter(f => f.id !== friendId);
      localStorage.setItem('friends', JSON.stringify(friends));

      if (currentChatId === friendId) {
        if (currentRoom) currentRoom.leave();
        currentRoom = null;
        currentChatId = null;
        elements.chatHeader.textContent = 'Выберите друга для начала чата';
        elements.messagesDiv.innerHTML = '';
      }
      renderFriends();
    };

    async function openChat(friendId, friendName, friendAvatar = '') {
      if (currentChatId === friendId) return;

      if (currentRoom) {
        currentRoom.leave();
        currentRoom = null;
      }

      currentChatId = friendId;
      elements.chatHeader.innerHTML = `Чат с <strong>${friendName}</strong> <small style="opacity:0.7;">(ID: ${friendId})</small>`;

      elements.messagesDiv.innerHTML = '';
      renderFriends();

      // Создаём приватную комнату
      const roomId = 'chat_' + [myId, friendId].sort().join('_');

      // Конфиг с предпочтением BitTorrent-трекеров (меньше ошибок релеев)
      currentRoom = joinRoom({
        appId,
        // Можно добавить свои трекеры, если нужно
        // relayUrls: [...] 
      }, roomId);

      currentRoom.onPeerJoin(peerId => {
        if (peerId === friendId) {
          onlinePeers.add(friendId);
          renderFriends();
        }
      });

      currentRoom.onPeerLeave(peerId => {
        if (peerId === friendId) onlinePeers.delete(friendId);
        renderFriends();
      });

      const [sendMsg, getMsg] = currentRoom.makeAction('message');

      getMsg((data, peerId) => {
        if (peerId !== friendId) return;
        addMessage(data.text, false, data.time, data.avatar);
      });

      if (chats[friendId]) {
        chats[friendId].forEach(m => addMessage(m.text, m.fromMe, m.time, m.avatar));
      }
    }

    function addMessage(text, fromMe, time = Date.now(), avatar = '') {
      const div = document.createElement('div');
      div.className = `message ${fromMe ? 'my-message' : 'friend-message'}`;
      div.innerHTML = `
        ${!fromMe && avatar ? `<img src="${avatar}" class="msg-avatar">` : ''}
        <div class="msg-content">
          <div>${text}</div>
          <small>${new Date(time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</small>
        </div>
      `;
      elements.messagesDiv.appendChild(div);
      elements.messagesDiv.scrollTop = elements.messagesDiv.scrollHeight;

      if (!chats[currentChatId]) chats[currentChatId] = [];
      chats[currentChatId].push({text, fromMe, time, avatar: fromMe ? myAvatar : avatar});
      localStorage.setItem('chats', JSON.stringify(chats));
    }

    function sendCurrentMessage() {
      const text = elements.messageInput.value.trim();
      if (!text || !currentChatId || !currentRoom) return;

      const time = Date.now();
      const [sendMsg] = currentRoom.makeAction('message');
      sendMsg({ text, time, avatar: myAvatar });

      addMessage(text, true, time, myAvatar);
      elements.messageInput.value = '';
    }

    function clearCurrentChat() {
      if (!currentChatId || !confirm('Очистить историю чата?')) return;
      delete chats[currentChatId];
      localStorage.setItem('chats', JSON.stringify(chats));
      elements.messagesDiv.innerHTML = '';
    }

    // ==================== СТИЛИ ====================
    const style = document.createElement('style');
    style.textContent = `
      :root { --accent: #0a84ff; }
      body { margin:0; font-family:system-ui,sans-serif; background:#0a0a0a; color:#eee; height:100vh; overflow:hidden; }
      .container { display:flex; height:100vh; }
      .sidebar { width:300px; background:#111; border-right:1px solid #222; display:flex; flex-direction:column; }
      .main { flex:1; display:flex; flex-direction:column; }
      .header { padding:16px; background:#1a1a1a; border-bottom:1px solid #222; font-weight:600; }
      .tab-content { flex:1; overflow:auto; padding:16px; }
      .hidden { display:none !important; }
      .friend-item { padding:12px; margin:6px 0; background:#1f1f1f; border-radius:12px; cursor:pointer; transition:0.2s; position:relative; }
      .friend-item:hover, .friend-item.active { background:#2a2a2a; }
      .messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; background:#0a0a0a; }
      .message { max-width:80%; display:flex; gap:10px; }
      .my-message { align-self:flex-end; flex-direction:row-reverse; }
      .friend-message { align-self:flex-start; }
      .msg-avatar { width:32px; height:32px; border-radius:50%; object-fit:cover; flex-shrink:0; }
      .msg-content { padding:10px 14px; border-radius:18px; background:#1f1f1f; }
      .my-message .msg-content { background:var(--accent); color:white; border-bottom-right-radius:4px; }
      .input-area { padding:12px; background:#111; border-top:1px solid #222; display:flex; gap:8px; }
      input, button { border:none; border-radius:8px; padding:10px 14px; }
      button { background:var(--accent); color:white; cursor:pointer; }
      button:hover { filter:brightness(1.1); }
      .tabs { display:flex; background:#1a1a1a; }
      .tab-btn { flex:1; padding:14px; background:none; border:none; color:#ccc; cursor:pointer; }
      .tab-btn.active { background:var(--accent); color:white; }
      #myAvatarPreview { width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid #333; }
    `;
    document.head.appendChild(style);

    window.onload = init;
  </script>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <div class="header"><h2>🔗 P2P Мессенджер</h2></div>

      <div class="tabs">
        <button id="profileTabBtn" class="tab-btn">Профиль</button>
        <button id="friendsTabBtn" class="tab-btn active">Друзья</button>
      </div>

      <div id="profileTab" class="tab-content hidden">
        <div style="text-align:center;margin-bottom:20px;">
          <img id="myAvatarPreview" src="" alt="Аватар">
          <input type="file" id="avatarInput" accept="image/*" style="margin-top:10px;display:block;margin:10px auto;">
        </div>
        <label>Моё имя</label>
        <input type="text" id="myName" placeholder="Имя">
        <p><strong>Мой ID:</strong> <span id="myId" style="font-family:monospace;word-break:break-all;display:block;margin:8px 0;"></span></p>
        <button id="copyIdBtn" style="width:100%;">Копировать ID</button>
      </div>

      <div id="friendsTab" class="tab-content">
        <h3>Мои друзья</h3>
        <div id="friendsList"></div>

        <h4 style="margin-top:30px;">Добавить друга</h4>
        <input type="text" id="newFriendId" placeholder="ID друга">
        <input type="text" id="newFriendName" placeholder="Имя (необязательно)">
        <button id="addFriendBtn" style="width:100%;">Добавить</button>
      </div>
    </div>

    <div class="main">
      <div class="header" id="chatHeader">Выберите друга, чтобы начать чат</div>
      <div id="chatTab" class="tab-content">
        <div id="messages" class="messages"></div>
        <div class="input-area">
          <input type="text" id="messageInput" placeholder="Сообщение..." style="flex:1;">
          <button id="sendBtn">Отправить</button>
          <button id="clearChatBtn" style="background:#333;">Очистить</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
